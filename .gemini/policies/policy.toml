commandPrefix = "" 
decision = "deny"
priority = 10

# ALLOW FILE SYSTEM TOOLS FOR SKILL DISCOVERY
# ==========================================

# 1. Auto-allow reading the SKILL.md file
[[rule]]
toolName = "read_file"
# This regex checks if "SKILL.md" appears anywhere in the tool's JSON arguments
argsPattern = ".*SKILL\\.md.*" 
decision = "allow"
priority = 100

# 2. Auto-allow the agent to list directories (often needed to find the skill)
[[rule]]
toolName = "list_directory"
decision = "allow"
priority = 100

# 3. Auto-allow it to search file contents (if it gets lost looking for scripts)
[[rule]]
toolName = "search_file_content"
argsPattern = ".*SKILL\\.md.*" 
decision = "allow"
priority = 100

# 4. Auto-allow native skill activation prompts 
[[rule]]
toolName = "activate_skill"
decision = "allow"
priority = 100

# ==========================================
# EXPLICIT BLOCK (Deny everything else)
# Low priority - this only triggers if the 
# command did not match one of the allowed prefixes above.
# ==========================================

[[rule]]
toolName = "read_file"
argsPattern = ".*"
decision = "deny"
priority = 10

[[rule]]
toolName = "read_file"
decision = "deny"
priority = 10

[[rule]]
toolName = "list_directory"
decision = "deny"
priority = 10

[[rule]]
toolName = "search_file_content"

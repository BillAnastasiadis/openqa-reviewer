priority = 10

[[rule]]
toolName = "grep_search"
decision = "deny"
priority = 10

# EXPLICITLY DENY ACCESS TO CREDENTIAL DIRECTORY
[[rule]]
name = "Block access to creds folder"
description = "Ensures the agent cannot read or modify the /credentials/ directory."
decision = "deny"
toolName = ".*"  # Applies to all tools (read, write, etc.)
pathPattern = ".*/credentials/.*"  # Regex pattern for the folder path
priority = 100